<style>
  :root{
    --bg0:#070513;
    --bg1:#0a0820;
    --ink:#e9f3ff;
    --muted:#b4b9e7;
    --pill: rgba(18, 15, 42, .72);
    --pillEdge: rgba(218,210,255,.18);
    --panelEdge: rgba(218,210,255,.18);
    --violetA: rgba(196,112,255,.20);
    --violetB: rgba(146, 84,255,.16);
    --violetC: rgba(220,126,255,.12);
  }

  *{ box-sizing:border-box; }

  html,body{
    height:100%;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
  }

  body{
    margin:0;
    color:var(--ink);
    font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
    background:
      radial-gradient(1200px 700px at 50% 42%, var(--violetA), rgba(0,0,0,0) 60%),
      radial-gradient(900px 540px at 50% 56%, var(--violetB), rgba(0,0,0,0) 65%),
      radial-gradient(1400px 940px at 50% 122%, var(--violetC), rgba(0,0,0,0) 55%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    overflow-x:hidden;
    overflow-x:clip;
    overscroll-behavior-x:none;
    overscroll-behavior-y:contain;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    touch-action: pan-y;
  }

  main, section, header, footer, nav, div {
    overscroll-behavior-x: none;
  }

  .wrap{
    width:min(1200px, calc(100% - 56px));
    margin: 18px auto 24px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    overflow-x:clip;
  }

  .topbar{
    display:flex;
    justify-content:center;
    position:relative;
    z-index:10;
  }

  .controls{
    display:flex;
    align-items:center;
    gap: 18px;
    padding: 16px 18px;
    border-radius: 18px;
    background: var(--pill);
    border: 1px solid var(--pillEdge);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),
      0 18px 60px rgba(0,0,0,.50);
    width:min(760px, 100%);
    justify-content:center;
    flex-wrap: wrap;
  }

  .controls label{
    font-size: 16px;
    line-height: 1;
    display:flex;
    align-items:center;
    gap: 10px;
  }

  .controls select{
    font-size: 16px;
    line-height: 1;
    height: 38px;
    padding: 0 12px;
    border-radius: 12px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    color: var(--ink);
    outline:none;
    min-width: 120px;
  }

  .controls input[type="checkbox"]{
    transform: scale(1.05);
    accent-color: #7ad3ff;
  }

  .controls .start{
    margin-left: 14px;
    padding: 12px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 650;
    letter-spacing: .02em;
    color: rgba(235,250,255,.98);
    background: linear-gradient(180deg, rgba(120,220,255,.22), rgba(255,255,255,.06));
    border: 1px solid rgba(140,220,255,.36);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      0 10px 28px rgba(0,0,0,.42),
      0 0 0 1px rgba(120,220,255,.12);
    cursor:pointer;
    transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    min-height: 46px;
    touch-action: manipulation;
  }

  .controls .start:hover{
    transform: translateY(-1px);
    background: linear-gradient(180deg, rgba(140,235,255,.26), rgba(255,255,255,.08));
    border-color: rgba(160,245,255,.46);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      0 14px 34px rgba(0,0,0,.48),
      0 0 34px rgba(120,220,255,.12);
  }

  .controls .start:active{ transform: translateY(0px); }

  .controls .start:focus-visible{
    outline: none;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      0 14px 34px rgba(0,0,0,.48),
      0 0 0 3px rgba(120,220,255,.22);
  }

  .controls .start[disabled]{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }

  .title-wrap{
    display:flex;
    justify-content:center;
    margin-top: 4px;
    position:relative;
    z-index:9;
  }

  .title{
    font-family: "Cinzel Decorative", system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial;
    font-size: 38px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(244,234,255,.94);
    opacity: 0;
    transform: translateY(-10px);
    text-shadow:
      0 0 18px rgba(214,132,255,.34),
      0 0 34px rgba(176,118,255,.22);
    transition: opacity 2.2s ease, transform 2.2s ease;
    user-select:none;
    text-align:center;
  }

  .title.visible{
    opacity: 1;
    transform: translateY(0);
  }

  .hero-row{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height: 360px;
    padding-top: 6px;
    padding-bottom: 20px;
  }

  .side-icons{
    position:absolute;
    left: 8px;
    top: 56%;
    transform: translateY(-50%);
    display:flex;
    flex-direction:column;
    gap: 18px;
    align-items:flex-start;
    z-index: 5;
  }

  .icon-link{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 8px;
    width: 92px;
    text-decoration:none;
    color: var(--muted);
    user-select:none;
  }

  .icon-btn{
    width: 58px;
    height: 58px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.16);
    background:
      radial-gradient(120% 120% at 30% 20%, rgba(200,140,255,.18), rgba(0,0,0,0) 55%),
      rgba(255,255,255,.05);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),
      0 14px 40px rgba(0,0,0,.38);
    display:grid;
    place-items:center;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
    overflow: hidden;
    touch-action: manipulation;
  }

  .icon-link:hover .icon-btn{
    transform: translateY(-1px);
    background:
      radial-gradient(120% 120% at 30% 20%, rgba(210,155,255,.22), rgba(0,0,0,0) 55%),
      rgba(255,255,255,.08);
    border-color: rgba(170,220,255,.30);
  }

  .icon-label{
    font-size: 14px;
    letter-spacing:.02em;
    text-align:center;
  }

  .ico-img{
    width: 52px;
    height: 52px;
    display:block;
    object-fit: cover;
    border-radius: 12px;
    image-rendering: auto;
    filter:
      saturate(1.25)
      contrast(1.05)
      drop-shadow(0 0 10px rgba(190,140,255,.22))
      drop-shadow(0 10px 24px rgba(0,0,0,.35));
    opacity: .98;
  }

  .stage{
    width: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  #ballWrap{
    position:relative;
    width: 320px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    z-index: 2;
    filter: drop-shadow(0 46px 110px rgba(0,0,0,.72));
    --beatScale: 1.0010;
    isolation: isolate;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    will-change: transform, filter;
  }

  .radiate, .aura, .aura2{ z-index: 0; }

  .radiate{
    position:absolute;
    inset:-26%;
    border-radius:50%;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 54%,
        rgba(246,208,255,.40) 0%,
        rgba(214,156,255,.28) 18%,
        rgba(168,118,255,.18) 36%,
        rgba(155,118,255,0) 66%);
    filter: blur(18px);
    opacity:.86;
    transition: opacity 68ms ease-out, filter 68ms ease-out;
  }

  .aura{
    position:absolute;
    inset:-28%;
    border-radius:50%;
    pointer-events:none;
    background: radial-gradient(circle,
      rgba(232,185,255,.42) 0%,
      rgba(186,150,255,.22) 34%,
      rgba(175,145,255,0) 72%);
    filter: blur(20px);
    opacity:.80;
    transition: opacity 68ms ease-out, filter 68ms ease-out;
  }

  .aura2{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    pointer-events:none;
    background: radial-gradient(circle at 50% 58%,
      rgba(214,160,255,.34) 0%,
      rgba(198,152,255,0) 68%);
    filter: blur(28px);
    opacity:.66;
    transition: opacity 68ms ease-out, filter 68ms ease-out;
  }

  .ball{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    z-index: 6;
    background:
      radial-gradient(circle at 50% 16%,
        rgba(8,6,18,.74) 0%,
        rgba(14,10,30,.48) 28%,
        rgba(160,110,255,.36) 58%,
        rgba(210,170,255,.65) 82%,
        rgba(230,215,255,.20) 100%),
      radial-gradient(circle at 50% 92%,
        rgba(245,235,255,.78) 0%,
        rgba(190,160,255,.20) 34%,
        rgba(30,22,60,.14) 74%,
        rgba(0,0,0,0) 100%);
    box-shadow:
      0 0 0 1px rgba(246,236,255,.13),
      0 0 74px rgba(214,168,255,.24),
      0 0 160px rgba(170,140,255,.18),
      inset 0 0 130px rgba(255,255,255,.12),
      inset 0 -145px 280px rgba(0,0,0,.20),
      inset 0 0 0 1px rgba(235,215,255,.12);
    transform-origin: 50% 102%;
    transform: scale(var(--beatScale)) translateZ(0);
    -webkit-transform: scale(var(--beatScale)) translateZ(0);
    transition: transform 66ms ease-out;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    -webkit-mask-image: -webkit-radial-gradient(white, black);
  }

  .ball::before{
    content:"";
    position:absolute;
    inset:-10%;
    border-radius:50%;
    pointer-events:none;
    background:
      radial-gradient(circle at 30% 18%,
        rgba(255,255,255,.62) 0%,
        rgba(255,255,255,.18) 18%,
        rgba(255,255,255,0) 46%),
      radial-gradient(circle at 80% 34%,
        rgba(230,255,255,.22) 0%,
        rgba(230,255,255,0) 48%),
      radial-gradient(circle,
        rgba(255,255,255,.12) 0%,
        rgba(255,255,255,0) 60%);
    transform: rotate(-10deg);
    opacity:.92;
  }

  .ball::after{
    content:"";
    position:absolute;
    inset:-12%;
    border-radius:50%;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 94%,
        rgba(245,255,255,.72) 0%,
        rgba(170,245,255,.20) 26%,
        rgba(170,245,255,0) 60%);
    opacity:.88;
  }

  .contactFade{
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    bottom:-8px;
    width: 330px;
    height: 150px;
    pointer-events:none;
    z-index: 7;
    border-radius: 999px;
    background:
      radial-gradient(ellipse at 50% 0%,
        rgba(0,0,0,.42) 0%,
        rgba(0,0,0,.22) 34%,
        rgba(0,0,0,0) 72%);
    filter: blur(12px);
    opacity: .44;
    mix-blend-mode: multiply;
  }

  .rimHard{
    position:absolute;
    inset:0;
    border-radius:50%;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,0) 67.9%,
        rgba(255,255,255,.60) 68.7%,
        rgba(255,255,255,.12) 69.8%,
        rgba(255,255,255,0) 71.3%);
    mix-blend-mode: screen;
    opacity: .62;
    filter: blur(.26px);
    transition: opacity 68ms ease-out, filter 68ms ease-out;
  }

  .rimInner{
    position:absolute;
    inset:2%;
    border-radius:50%;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,0) 66.8%,
        rgba(224,188,255,.22) 68.4%,
        rgba(20,18,40,.10) 69.6%,
        rgba(255,255,255,0) 71.2%);
    mix-blend-mode: screen;
    opacity: .50;
    filter: blur(.44px);
    transition: opacity 68ms ease-out, filter 68ms ease-out;
  }

  .sparkles{
    display:none;
  }

  .swirlA,.swirlB,.swirlC{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    pointer-events:none;
    opacity:.66;
    filter: blur(18px);
    mix-blend-mode: screen;
  }

  .swirlA{
    background:
      conic-gradient(from 220deg,
        rgba(214,255,255,0) 0%,
        rgba(214,255,255,.20) 14%,
        rgba(214,255,255,0) 30%,
        rgba(186,245,255,.14) 54%,
        rgba(214,255,255,0) 74%,
        rgba(214,255,255,.12) 90%,
        rgba(214,255,255,0) 100%),
      radial-gradient(52% 44% at 56% 56%,
        rgba(198,255,255,.22),
        rgba(190,255,255,0) 72%);
    animation: swirlA 10s ease-in-out infinite alternate;
  }

  .swirlB{
    opacity:.54;
    filter: blur(24px);
    background:
      conic-gradient(from 40deg,
        rgba(166,230,255,0) 0%,
        rgba(166,230,255,.18) 18%,
        rgba(166,230,255,0) 40%,
        rgba(134,210,255,.14) 62%,
        rgba(166,230,255,0) 80%,
        rgba(166,230,255,.12) 94%,
        rgba(166,230,255,0) 100%),
      radial-gradient(46% 38% at 44% 48%,
        rgba(156,220,255,.18),
        rgba(140,220,255,0) 74%);
    animation: swirlB 14s ease-in-out infinite alternate;
  }

  .swirlC{
    opacity:.30;
    filter: blur(30px);
    mix-blend-mode: multiply;
    background: radial-gradient(58% 42% at 52% 22%,
      rgba(0,0,0,.30),
      rgba(0,0,0,0) 72%);
    animation: storm 9s ease-in-out infinite alternate;
  }

  @keyframes swirlA{ from{ transform: translate(-10px,-6px) rotate(-6deg)} to{ transform: translate(12px,10px) rotate(10deg)} }
  @keyframes swirlB{ from{ transform: translate(12px,10px) rotate(12deg)} to{ transform: translate(-12px,-10px) rotate(-10deg)} }
  @keyframes storm{ from{ transform: translate(-10px,0px) scale(1.02)} to{ transform: translate(10px,8px) scale(0.98)} }

  .mist,.mist2{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    pointer-events:none;
    filter: blur(22px);
    mix-blend-mode: screen;
    opacity:.92;
    z-index: 1;
  }

  .mist{
    background: radial-gradient(64% 46% at 50% 56%,
      rgba(198,160,255,.18),
      rgba(190,160,255,0) 74%);
    animation: drift 7s ease-in-out infinite alternate;
  }

  .mist2{
    background: radial-gradient(60% 42% at 46% 78%,
      rgba(182,140,255,.15),
      rgba(170,140,255,0) 76%);
    animation: drift2 9.5s ease-in-out infinite alternate;
  }

  @keyframes drift{ from{transform:translateY(-8px)} to{transform:translateY(8px)} }
  @keyframes drift2{ from{transform:translateX(-10px)} to{transform:translateX(10px)} }

  .ground-glow{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-98px;
    width: 620px;
    height: 235px;
    background: radial-gradient(circle at 50% 26%,
      rgba(216,176,255,.26) 0%,
      rgba(166,132,255,.10) 26%,
      rgba(140,220,255,0) 74%);
    filter: blur(30px);
    opacity:.48;
    pointer-events:none;
    z-index: 0;
  }

  .seatShadow{
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    bottom: -6px;
    width: 238px;
    height: 42px;
    pointer-events:none;
    z-index: 3;
    opacity: .88;
    filter: blur(6px);
    background:
      radial-gradient(ellipse at 50% 40%,
        rgba(0,0,0,.58) 0%,
        rgba(0,0,0,.34) 28%,
        rgba(0,0,0,0) 72%),
      radial-gradient(ellipse at 50% 15%,
        rgba(220,180,255,.14) 0%,
        rgba(200,255,255,0) 60%);
    mix-blend-mode: multiply;
  }

  .cradle{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-9px;
    width: 244px;
    height: 28px;
    border-radius: 999px;
    pointer-events:none;
    z-index: 4;
    background:
      radial-gradient(ellipse at 50% 18%,
        rgba(255,255,255,.10) 0%,
        rgba(255,255,255,.06) 22%,
        rgba(0,0,0,0) 52%,
        rgba(236,206,255,.12) 56%,
        rgba(170,128,255,.20) 62%,
        rgba(18,20,44,.90) 70%,
        rgba(0,0,0,0) 78%),
      linear-gradient(180deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,0));
    border: 1px solid rgba(220,188,255,.22);
    box-shadow:
      0 10px 22px rgba(0,0,0,.40),
      inset 0 1px 0 rgba(255,255,255,.10),
      0 0 24px rgba(190,140,255,.10);
    opacity: .98;
  }

  .pedestal{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-32px;
    width: 312px;
    height: 32px;
    border-radius: 999px;
    pointer-events:none;
    z-index: 2;
    background:
      radial-gradient(150px 16px at 50% 18%,
        rgba(255,255,255,.16),
        rgba(255,255,255,0) 72%),
      linear-gradient(180deg,
        rgba(56,34,98,.88),
        rgba(16,12,30,.98));
    border: 1px solid rgba(224,190,255,.20);
    box-shadow:
      0 30px 80px rgba(0,0,0,.60),
      inset 0 1px 0 rgba(255,255,255,.10),
      inset 0 -14px 18px rgba(0,0,0,.44),
      0 0 30px rgba(180,120,255,.08);
  }

  .pedestal::before{
    content:"";
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    bottom:-12px;
    width: 372px;
    height: 18px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(20,12,38,.90), rgba(0,0,0,.96));
    border: 1px solid rgba(176,126,255,.12);
    box-shadow:
      0 16px 54px rgba(0,0,0,.66),
      inset 0 1px 0 rgba(255,255,255,.05);
    opacity:.98;
  }

  .pedestal::after{
    content:"";
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    top: 6px;
    width: 226px;
    height: 16px;
    border-radius: 999px;
    background:
      radial-gradient(120px 10px at 50% 55%,
        rgba(0,0,0,.58),
        rgba(0,0,0,0) 74%),
      linear-gradient(180deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,0));
    opacity:.94;
  }

  #ballWrap.idle .radiate{ opacity:.42; filter: blur(24px); }
  #ballWrap.idle .aura{ opacity:.34; filter: blur(20px); }
  #ballWrap.idle .aura2{ opacity:.26; filter: blur(28px); }
  #ballWrap.idle .rimHard{ opacity:.56; }
  #ballWrap.idle .rimInner{ opacity:.42; }

  #ballWrap.speaking .radiate{
    opacity:1;
    filter: blur(12px) brightness(1.18);
  }
  #ballWrap.speaking .aura{
    opacity:1;
    filter: blur(9px) brightness(1.16);
  }
  #ballWrap.speaking .aura2{
    opacity:.94;
    filter: blur(12px) brightness(1.12);
  }
  #ballWrap.speaking .rimHard{
    opacity:1;
    filter: blur(.10px) brightness(1.18);
  }
  #ballWrap.speaking .rimInner{
    opacity:.84;
    filter: blur(.16px) brightness(1.14);
  }

  #ballWrap.beat .radiate{
    opacity:1;
    filter: blur(7px) brightness(1.42);
  }
  #ballWrap.beat .aura{
    opacity:1;
    filter: blur(5px) brightness(1.34);
  }
  #ballWrap.beat .aura2{
    opacity:1;
    filter: blur(8px) brightness(1.24);
  }
  #ballWrap.beat .rimHard{
    opacity:1;
    filter: blur(.06px) brightness(1.28);
  }
  #ballWrap.beat .rimInner{
    opacity:.96;
    filter: blur(.10px) brightness(1.22);
  }

  .action-bar{
    width:min(1040px, 100%);
    margin: 2px auto 4px;
    display:flex;
    justify-content:center;
    position: relative;
    z-index: 8;
  }

  .action-bar .buttons{
    width:min(560px, 100%);
    display:flex;
    justify-content:center;
    gap: 12px;
    flex-wrap:wrap;
    padding: 8px 12px 10px;
    border-radius: 18px;
    border: 1px solid rgba(210,230,255,.14);
    background: rgba(8,14,28,.26);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),

<script>
const API = "https://word-psychic-web.onrender.com";

const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const IS_MOBILE_LAYOUT = window.matchMedia("(max-width: 768px)").matches || IS_IOS;
const IS_SAFARI = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const IS_DESKTOP_SAFARI = IS_SAFARI && !IS_MOBILE_LAYOUT;
const IS_CHROME = /chrome|crios|chromium/i.test(navigator.userAgent) && !/edg|opr|opera/i.test(navigator.userAgent);
const IS_DESKTOP_CHROME = IS_CHROME && !IS_MOBILE_LAYOUT && !IS_IOS;
const USE_FALLBACK_BEATS = true;

const WHOOSH_MS = 2400;
const WHOOSH_BUFFER_MS = 560;

const ELLIPSIS_DELAY = 1500;
const FINAL_ELLIPSIS_DELAY = 2200;

const SENTENCE_PAUSE_MS   = 220;
const PARAGRAPH_PAUSE_MS  = 720;
const SECTION_PAUSE_MS    = 980;
const INPUT_GUARD_MS      = 700;

let sessionId = null;
let voiceReady = false;
let chosenVoice = null;
let startBound = false;
let titleShown = false;

let runToken = 0;
let startInFlight = false;
let chooseInFlight = false;
let sessionDone = false;
let currentFetchController = null;

let speakingCount = 0;
let beatOffTimer = null;
let fallbackBeatTimer = null;
let lastActionTs = 0;
let currentSpeechNonce = 0;
let speechGeneration = 0;
let speechStartTs = 0;
let orbKillVersion = 0;
let orbKillTimers = [];
let activeUtterance = null;
let chromePulseTimer = null;
let chromePulseNonce = 0;

function bumpRunToken(){ runToken++; return runToken; }
function isTokenLive(t){ return t === runToken; }

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
function nextFrame(){ return new Promise(r => requestAnimationFrame(r)); }

function abortInFlightFetch(){
  try{ currentFetchController?.abort(); }catch(e){}
  currentFetchController = null;
}

const screenEl = document.getElementById("screen");
const statusEl = document.getElementById("status");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const stopBtn = document.getElementById("stopBtn");
const startBtn = document.getElementById("startBtn");
const speedSel = document.getElementById("speed");
const speakWhileTyping = document.getElementById("speakWhileTyping");
const voiceLabel = document.getElementById("voiceLabel");
const ballWrap = document.getElementById("ballWrap");
const titleEl = document.getElementById("titleText");

function trimLeadingNewlines(s){ return (s ?? "").replace(/^\s*\n+/, ""); }

function tightenQuestionSpacing(s){
  let t = (s ?? "");
  t = t.replace(/\r\n/g, "\n");
  t = t.replace(/\n{3,}/g, "\n\n");
  const qStart = "(Do you\\b|Would you\\b|Shall we\\b|Shall I\\b|Select\\b|Yes\\b|A simple\\b)";
  t = t.replace(new RegExp(`([^\\n])\\n(?=\\s*${qStart})`, "gi"), "$1\n\n");
  t = t.replace(new RegExp(`\\n{3,}(?=\\s*${qStart})`, "gi"), "\n\n");
  return t;
}

function normalizeCTA(s){
  return tightenQuestionSpacing(
    (s ?? "")
      .replace(/Choose Yes or No\./gi, "Select Yes or No.")
      .replace(/Choose Yes or No/gi, "Select Yes or No")
      .replace(/Click Yes or No\./gi, "Select Yes or No.")
      .replace(/Click Yes or No/gi, "Select Yes or No")
      .replace(/Choose Yes,\s*No,\s*or End session\./gi, "Select Yes, No, or End session.")
      .replace(/Choose Yes,\s*No,\s*or End session/gi, "Select Yes, No, or End session")
      .replace(/Click Yes,\s*No,\s*or End session\./gi, "Select Yes, No, or End session.")
      .replace(/Click Yes,\s*No,\s*or End session/gi, "Select Yes, No, or End session")
  );
}

function autoScrollScreen(){
  try { screenEl.scrollTop = screenEl.scrollHeight; } catch(e){}
}

function quickClearScreen(){
  screenEl.textContent = "";
  try { screenEl.scrollTop = 0; } catch(e){}
}

function setButtonsEnabled(on){
  yesBtn.disabled = noBtn.disabled = !on;
}

function setStartEnabled(on){
  startBtn.disabled = !on;
}

function showStopButton(show){
  stopBtn.classList.toggle("placeholder", !show);
  stopBtn.disabled = !show;
  stopBtn.setAttribute("aria-hidden", (!show).toString());
}

function paceFactor(){
  const v = speedSel.value;

  if (IS_IOS){
    return v === "slow" ? 1.00 : v === "fast" ? 0.60 : 0.72;
  }

  return v === "slow" ? 1.00 : v === "fast" ? 0.58 : 0.68;
}

function getTypingProfile(){
  const v = speedSel.value;

  if (IS_IOS){
    if (v === "slow") return { char: 21, space: 12, punct: 102, comma: 58, line: 146 };
    if (v === "fast") return { char: 13, space: 7, punct: 64, comma: 36, line: 92 };
    return { char: 16, space: 9, punct: 78, comma: 44, line: 110 };
  }

  if (IS_MOBILE_LAYOUT || IS_SAFARI){
    if (v === "slow") return { char: 21, space: 12, punct: 82, comma: 46, line: 126 };
    if (v === "fast") return { char: 11, space: 6, punct: 42, comma: 24, line: 72 };
    return { char: 14, space: 8, punct: 52, comma: 30, line: 86 };
  }

  if (v === "slow") return { char: 18, space: 11, punct: 86, comma: 48, line: 128 };
  if (v === "fast") return { char: 10, space: 6, punct: 46, comma: 26, line: 76 };
  return { char: 13, space: 8, punct: 60, comma: 34, line: 96 };
}

function charDelay(ch){
  const p = getTypingProfile();
  const f = paceFactor();

  if (ch === "\n") return p.line * f;
  if (/[.!?:]/.test(ch)) return p.punct * f;
  if (/[,;]/.test(ch)) return p.comma * f;
  if (/\s/.test(ch)) return p.space * f;
  return p.char * f;
}

function leadBeforeVoiceMs(){
  const v = speedSel.value;

  if (IS_IOS){
    return v === "slow" ? 90 : v === "fast" ? 20 : 42;
  }

  if (IS_MOBILE_LAYOUT){
    return v === "slow" ? 120 : v === "fast" ? 35 : 70;
  }

  if (IS_SAFARI){
    return v === "slow" ? 95 : v === "fast" ? 25 : 55;
  }

  return v === "slow" ? 85 : v === "fast" ? 20 : 45;
}

function baseSpeechRate(){
  const v = speedSel.value;

  if (IS_IOS){
    return v === "slow" ? 0.96 : v === "fast" ? 1.22 : 1.14;
  }

  if (IS_MOBILE_LAYOUT){
    return v === "slow" ? 0.93 : v === "fast" ? 1.18 : 1.11;
  }

  if (IS_SAFARI){
    return v === "slow" ? 0.92 : v === "fast" ? 1.30 : 1.10;
  }

  return v === "slow" ? 0.91 : v === "fast" ? 1.22 : 1.05;
}

function syncVoiceLabel(){
  voiceLabel.textContent = speakWhileTyping.checked ? "Voice On" : "Voice Off";
  if (!speakWhileTyping.checked){
    try { speechSynthesis.cancel(); } catch(e) {}
    activeUtterance = null;
    speakingCount = 0;
    speechGeneration++;
    currentSpeechNonce++;
    clearOrbKillTimers();
    stopFallbackBeats();
    stopChromePulseLoop();
    ballWrap.classList.remove("speaking");
    ballWrap.classList.remove("beat");
    ballWrap.classList.add("idle");
    ballWrap.style.setProperty("--beatScale","1.0010");
    clearTimeout(beatOffTimer);
  }
}

function setBeatScale(scale){
  ballWrap.style.setProperty("--beatScale", String(scale));
}

function clearOrbKillTimers(){
  for (const id of orbKillTimers) clearTimeout(id);
  orbKillTimers = [];
}

function forceOrbOffNow(){
  clearOrbKillTimers();
  stopFallbackBeats();
  stopChromePulseLoop();
  speakingCount = 0;
  ballWrap.classList.remove("beat");
  ballWrap.classList.remove("speaking");
  ballWrap.classList.add("idle");
  setBeatScale("1.0010");
}

function forceOrbOffHard(){
  const myKill = ++orbKillVersion;

  stopFallbackBeats();
  stopChromePulseLoop();
  clearTimeout(beatOffTimer);
  forceOrbOffNow();

  const killAgain = () => {
    if (myKill !== orbKillVersion) return;
    stopFallbackBeats();
    stopChromePulseLoop();
    clearTimeout(beatOffTimer);
    speakingCount = 0;
    ballWrap.classList.remove("beat");
    ballWrap.classList.remove("speaking");
    ballWrap.classList.add("idle");
    setBeatScale("1.0010");
  };

  orbKillTimers.push(setTimeout(killAgain, 0));
  orbKillTimers.push(setTimeout(killAgain, 40));
  orbKillTimers.push(setTimeout(killAgain, 90));
  orbKillTimers.push(setTimeout(killAgain, 160));

  requestAnimationFrame(() => {
    if (myKill !== orbKillVersion) return;
    killAgain();
    requestAnimationFrame(() => {
      if (myKill !== orbKillVersion) return;
      killAgain();
    });
  });
}

function hardPulseOff(){
  clearTimeout(beatOffTimer);
  ballWrap.classList.remove("beat");

  if (IS_DESKTOP_SAFARI || IS_DESKTOP_CHROME){
    setBeatScale("1.0010");
  }else{
    setBeatScale(ballWrap.classList.contains("speaking") ? "1.0022" : "1.0010");
  }
}

function hardStopOrbVisuals(){
  currentSpeechNonce++;
  activeUtterance = null;
  stopFallbackBeats();
  stopChromePulseLoop();
  forceOrbOffHard();
}

function triggerBeat(strength = 1){
  if (!ballWrap.classList.contains("speaking")) return;

  const maxStrength = IS_IOS ? 1.36 : (IS_MOBILE_LAYOUT ? 1.42 : 1.40);
  const s = Math.max(0.92, Math.min(maxStrength, strength));

  let scale;

  if (IS_DESKTOP_SAFARI || IS_DESKTOP_CHROME){
    scale = 1.0010;
  }else if (IS_IOS){
    scale = 1.0022 + (s - 1) * 0.0030;
  }else if (IS_MOBILE_LAYOUT){
    scale = 1.0052 + (s - 1) * 0.0088;
  }else{
    scale = 1.0050 + (s - 1) * 0.0084;
  }

  ballWrap.classList.add("beat");
  setBeatScale(scale.toFixed(4));

  clearTimeout(beatOffTimer);
  beatOffTimer = setTimeout(() => {
    ballWrap.classList.remove("beat");

    if (IS_DESKTOP_SAFARI || IS_DESKTOP_CHROME){
      setBeatScale("1.0010");
    }else{
      setBeatScale(ballWrap.classList.contains("speaking") ? "1.0022" : "1.0010");
    }
  }, IS_DESKTOP_CHROME ? 120 : (IS_IOS ? 118 : (IS_MOBILE_LAYOUT ? 125 : 102)));
}

function startFallbackBeats(generation){
  if (!USE_FALLBACK_BEATS) return;
  stopFallbackBeats();

  if (IS_IOS) return;
  if (IS_DESKTOP_CHROME) return;

  let active = true;
  const baseDelay = IS_MOBILE_LAYOUT ? 140 : 120;
  const variance = IS_MOBILE_LAYOUT ? 120 : 90;

  function loop(){
    if (!active) return;
    if (generation !== speechGeneration) return;
    if (!ballWrap.classList.contains("speaking")) return;

    const delay = baseDelay + (Math.random() * variance);

    fallbackBeatTimer = setTimeout(() => {
      if (!active) return;
      if (generation !== speechGeneration) return;
      if (!ballWrap.classList.contains("speaking")) return;

      const strength = IS_MOBILE_LAYOUT
        ? (1.08 + Math.random() * 0.18)
        : (1.10 + Math.random() * 0.14);

      triggerBeat(strength);
      loop();
    }, delay);
  }

  loop();
}

function stopFallbackBeats(){
  clearTimeout(fallbackBeatTimer);
  fallbackBeatTimer = null;
}

function stopChromePulseLoop(){
  chromePulseNonce++;
  clearTimeout(chromePulseTimer);
  chromePulseTimer = null;
}

function startChromePulseLoop(generation, utterNonce){
  if (!IS_DESKTOP_CHROME) return;

  stopChromePulseLoop();
  const myPulse = ++chromePulseNonce;

  function loop(){
    if (myPulse !== chromePulseNonce) return;
    if (generation !== speechGeneration) return;
    if (utterNonce !== currentSpeechNonce) return;
    if (!ballWrap.classList.contains("speaking")) return;

    triggerBeat(1.11);

    chromePulseTimer = setTimeout(
      loop,
      105 + Math.random() * 85
    );
  }

  chromePulseTimer = setTimeout(loop, 70);
}

function setSpeaking(on, generation = speechGeneration){
  if (generation !== speechGeneration) return;

  speakingCount = Math.max(0, speakingCount + (on ? 1 : -1));
  const isSpeaking = speakingCount > 0;

  ballWrap.classList.toggle("speaking", isSpeaking);
  ballWrap.classList.toggle("idle", !isSpeaking);

  if (IS_DESKTOP_SAFARI || IS_DESKTOP_CHROME){
    setBeatScale("1.0010");
  }else{
    setBeatScale(isSpeaking ? "1.0022" : "1.0010");
  }

  if (isSpeaking){
    speechStartTs = performance.now();
    startFallbackBeats(generation);
  }else{
    stopFallbackBeats();
    stopChromePulseLoop();
    clearTimeout(beatOffTimer);
    ballWrap.classList.remove("beat");
    ballWrap.classList.remove("speaking");
    ballWrap.classList.add("idle");
    setBeatScale("1.0010");
  }
}

function updateSpeakingFromEngine(){
  try{
    const active = !!(window.speechSynthesis && speechSynthesis.speaking);

    if (active || speakingCount > 0){
      ballWrap.classList.add("speaking");
      ballWrap.classList.remove("idle");

      if (IS_DESKTOP_SAFARI || IS_DESKTOP_CHROME){
        setBeatScale("1.0010");
      }else{
        setBeatScale("1.0022");
      }

      if (USE_FALLBACK_BEATS && !IS_DESKTOP_CHROME) startFallbackBeats(speechGeneration);
    }else{
      stopFallbackBeats();
      stopChromePulseLoop();
      clearTimeout(beatOffTimer);
      ballWrap.classList.remove("speaking");
      ballWrap.classList.remove("beat");
      ballWrap.classList.add("idle");
      setBeatScale("1.0010");
    }
  }catch(e){}
}

function hardStopAllAudioAndBeats(){
  speechGeneration++;
  currentSpeechNonce++;

  try{
    speechSynthesis.cancel();
  }catch(e){}

  activeUtterance = null;
  stopFallbackBeats();
  stopChromePulseLoop();
  forceOrbOffHard();
}

function playGhostlyWhoosh(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;

    const ctx = new AudioCtx();
    if (ctx.state === "suspended") ctx.resume();

    const dur = WHOOSH_MS / 1000;
    const sr = ctx.sampleRate;
    const frames = Math.floor(sr * dur);

    const buf = ctx.createBuffer(1, frames, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < frames; i++){
      const white = (Math.random()*2-1);
      const low = (i ? data[i-1] * 0.90 : 0);
      data[i] = (white * 0.55) + (low * 0.45);
    }

    const src = ctx.createBufferSource();
    src.buffer = buf;

    const filter = ctx.createBiquadFilter();
    filter.type = "lowpass";

    const filter2 = ctx.createBiquadFilter();
    filter2.type = "bandpass";
    filter2.Q.value = 0.9;

    const gain = ctx.createGain();
    const now = ctx.currentTime;
    const peakGain = IS_IOS ? 0.50 : 0.40;
    const tailGain = IS_IOS ? 0.18 : 0.14;

    filter.frequency.setValueAtTime(260, now);
    filter.frequency.exponentialRampToValueAtTime(1550, now + dur*0.62);
    filter.frequency.exponentialRampToValueAtTime(520,  now + dur);

    filter2.frequency.setValueAtTime(320, now);
    filter2.frequency.exponentialRampToValueAtTime(920, now + dur*0.70);
    filter2.frequency.exponentialRampToValueAtTime(420, now + dur);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peakGain, now + dur*0.22);
    gain.gain.exponentialRampToValueAtTime(tailGain, now + dur*0.78);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    src.connect(filter);
    filter.connect(filter2);
    filter2.connect(gain);
    gain.connect(ctx.destination);

    src.start(now);
    src.stop(now + dur + 0.05);
  }catch(e){}
}

function unlockVoice(){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.rate = 1;
    u.pitch = 1;
    speechSynthesis.speak(u);
    voiceReady = true;
    selectVoice();
    setTimeout(() => {
      try { speechSynthesis.cancel(); } catch(e){}
    }, 60);
  }catch(e){
    voiceReady = false;
  }
}

async function primeSpeechEngine(){
  if (!("speechSynthesis" in window)) return;

  try{
    speechSynthesis.resume?.();

    const u = new SpeechSynthesisUtterance(".");
    if (chosenVoice) u.voice = chosenVoice;
    if (chosenVoice?.lang) u.lang = chosenVoice.lang;
    u.volume = 0;
    u.rate = 1;
    u.pitch = 1;

    await new Promise(resolve => {
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        resolve();
      };

      u.onend = finish;
      u.onerror = finish;

      try{
        speechSynthesis.speak(u);
      }catch(e){
        finish();
      }

      setTimeout(finish, 260);
    });

    await sleep(50);
  }catch(e){}
}

const TOP_PSYCHIC_VOICES = [
  "Google UK English Female",
  "Isha",
  "Tessa",
  "Stephanie",
  "Martha",
  "Sangeeta",
  "Fiona",
  "Karen"
];

const SECOND_TIER_VOICES = [
  "Samantha",
  "Moira",
  "Veena",
  "Google US English",
  "Microsoft Aria",
  "Microsoft Jenny",
  "Microsoft Sonia",
  "Microsoft Ava",
  "Microsoft Emma",
  "Microsoft Ana",
  "Microsoft Zira"
];

const ALL_PREFERRED_VOICES = [
  ...TOP_PSYCHIC_VOICES,
  ...SECOND_TIER_VOICES
];

function normVoiceName(s){
  return String(s || "")
    .toLowerCase()
    .replace(/\s+/g, " ")
    .trim();
}

function isEnglishVoice(v){
  return !!(v && v.lang && /^en([-_]|$)/i.test(v.lang));
}

function scoreGenericEnglishVoice(v){
  const name = normVoiceName(v?.name || "");
  const lang = String(v?.lang || "").toLowerCase();
  let score = 0;

  if (/(google uk english female)/i.test(name)) score += 30;
  if (/(isha|tessa|stephanie|martha|sangeeta|fiona|karen)/i.test(name)) score += 18;
  if (/(samantha|moira|veena)/i.test(name)) score += 10;
  if (/(female|woman|aria|jenny|sonia|ava|emma|ana|zira)/i.test(name)) score += 8;
  if (/google/.test(name)) score += 5;
  if (/microsoft/.test(name)) score += 4;
  if (/en-gb/.test(lang)) score += 8;
  if (/en-au|en-ie|en-in|en-za/.test(lang)) score += 4;
  if (/en-us/.test(lang)) score += 2;

  return score;
}

function selectVoice(){
  const voices = speechSynthesis.getVoices() || [];
  console.log("Available voices:", voices.map(v => `${v.name} [${v.lang}]`));

  if (!voices.length){
    chosenVoice = null;
    console.log("Chosen voice:", "none");
    return chosenVoice;
  }

  const byExactName = new Map(
    voices.filter(v => v && v.name).map(v => [normVoiceName(v.name), v])
  );

  for (const preferred of ALL_PREFERRED_VOICES){
    const exact = byExactName.get(normVoiceName(preferred));
    if (exact){
      chosenVoice = exact;
      console.log("Chosen voice (auto):", `${chosenVoice.name} [${chosenVoice.lang}]`);
      return chosenVoice;
    }
  }

  for (const preferred of ALL_PREFERRED_VOICES){
    const wanted = normVoiceName(preferred);
    const partial = voices.find(v => {
      const n = normVoiceName(v?.name || "");
      return n === wanted || n.includes(wanted) || wanted.includes(n);
    });
    if (partial){
      chosenVoice = partial;
      console.log("Chosen voice (auto):", `${chosenVoice.name} [${chosenVoice.lang}]`);
      return chosenVoice;
    }
  }

  const englishVoices = voices.filter(isEnglishVoice);
  if (englishVoices.length){
    englishVoices.sort((a, b) => scoreGenericEnglishVoice(b) - scoreGenericEnglishVoice(a));
    chosenVoice = englishVoices[0];
    console.log("Chosen voice (fallback):", `${chosenVoice.name} [${chosenVoice.lang}]`);
    return chosenVoice;
  }

  chosenVoice = voices[0] || null;
  console.log("Chosen voice:", chosenVoice ? `${chosenVoice.name} [${chosenVoice.lang}]` : "none");
  return chosenVoice;
}

async function ensureVoiceSelected(timeoutMs = 1500){
  const start = performance.now();
  selectVoice();

  while ((!chosenVoice || !voiceReady) && (performance.now() - start) < timeoutMs){
    await sleep(50);
    selectVoice();
  }
}

function voiceSignatureBase(){
  const name = normVoiceName(chosenVoice?.name || "");

  if (IS_IOS && name.includes("tessa")) return 0.94;
  if (IS_DESKTOP_SAFARI && name.includes("tessa")) return 0.84;

  if (name.includes("google uk english female")) return 0.88;
  if (name.includes("isha")) return 0.92;
  if (name.includes("tessa")) return 0.89;
  if (name.includes("stephanie")) return 0.90;
  if (name.includes("martha")) return 0.88;
  if (name.includes("sangeeta")) return 0.84;
  if (name.includes("fiona")) return 0.85;
  if (name.includes("karen")) return 0.88;
  if (name.includes("samantha")) return 0.86;
  if (name.includes("moira")) return 0.84;
  if (name.includes("veena")) return 0.80;
  if (
    name.includes("microsoft aria") ||
    name.includes("microsoft jenny") ||
    name.includes("microsoft sonia") ||
    name.includes("microsoft ava") ||
    name.includes("microsoft emma") ||
    name.includes("microsoft ana")
  ) return 0.89;
  if (name.includes("microsoft zira")) return 0.87;
  if (name.includes("google us english")) return 0.88;
  if (isEnglishVoice(chosenVoice)) return 0.87;

  return 0.88;
}

function styleParams(){
  const name = normVoiceName(chosenVoice?.name || "");
  let pitch = 0.98;
  let rate;

  if (IS_IOS && name.includes("tessa")){
    pitch =
      speedSel.value === "slow" ? 0.86 :
      speedSel.value === "fast" ? 0.92 :
      0.89;

    rate =
      speedSel.value === "slow" ? 0.70 :
      speedSel.value === "fast" ? 1.12 :
      0.96;

    return { pitch, rate };
  }

  if (IS_DESKTOP_SAFARI && name.includes("tessa")){
    pitch =
      speedSel.value === "slow" ? 0.88 :
      speedSel.value === "fast" ? 0.93 :
      0.90;

    rate =
      speedSel.value === "slow" ? 0.72 :
      speedSel.value === "fast" ? 1.08 :
      1.00;

    return { pitch, rate };
  }

  if (name.includes("tessa")) pitch = 0.95;
  else if (name.includes("martha")) pitch = 0.96;
  else if (name.includes("sangeeta")) pitch = 0.94;
  else if (name.includes("fiona")) pitch = 0.95;
  else if (name.includes("moira")) pitch = 0.97;
  else if (name.includes("veena")) pitch = 0.92;
  else if (name.includes("samantha")) pitch = 0.99;
  else pitch = 0.97;

  rate = Math.max(0.62, Math.min(1.14, baseSpeechRate() * voiceSignatureBase()));
  return { pitch, rate };
}

function isEllipsisOnly(text){
  return text.trim().replace(/[.\u2026]/g, "") === "";
}

function textForSpeech(text){
  let t = text.replace(/\u2026/g, "").replace(/\.{3,}/g, "");
  t = t.replace(/ ?→ ?/g, ". ");
  return t;
}

function voiceSpecificSpeechText(text){
  let t = textForSpeech(text);
  const name = normVoiceName(chosenVoice?.name || "");

  if (
    name.includes("veena") ||
    name.includes("moira") ||
    name.includes("samantha") ||
    name.includes("sangeeta") ||
    name.includes("fiona") ||
    (IS_IOS && name.includes("tessa"))
  ){
    t = t
      .replace(/—/g, ". ")
      .replace(/\s+-\s+/g, ". ")
      .replace(/;/g, ". ")
      .replace(/:\s+/g, ". ")
      .replace(/\s{2,}/g, " ")
      .trim();
  }

  if (IS_IOS && name.includes("tessa")){
    t = t
      .replace(/\bvery well\b/gi, "Very well")
      .replace(/\bjourney further\b/gi, "go further")
      .replace(/\breveal another word\b/gi, "show another word")
      .replace(/\bshall we continue\b/gi, "shall we go on")
      .replace(/\byou may choose\b/gi, "you may select")
      .replace(/,\s+/g, ". ");
  }

  if (name.includes("veena")){
    t = t
      .replace(/\bvery well\b/gi, "Very well")
      .replace(/\bjourney further\b/gi, "go further")
      .replace(/\breveal another word\b/gi, "show another word");
  }

  return t;
}

function splitChunks(full){
  const out = [];
  let buf = "";

  for (let i = 0; i < full.length; i++){
    if (full.slice(i, i + 3) === "\n\n\n"){
      if (buf) out.push(buf);
      buf = "";
      out.push("\n\n\n");
      i += 2;
      continue;
    }

    if (full.slice(i, i + 2) === "\n\n"){
      if (buf) out.push(buf);
      buf = "";
      out.push("\n\n");
      i += 1;
      continue;
    }

    const ch = full[i];
    const next = full[i + 1];
    buf += ch;

    const isEndPunct =
      (ch === "." || ch === "!" || ch === "?") &&
      (i + 1 >= full.length || /\s/.test(next));

    const isColonLineBreak =
      ch === ":" && next === "\n";

    if (isEndPunct || isColonLineBreak){
      out.push(buf);
      buf = "";
    }
  }

  if (buf) out.push(buf);
  return out;
}

function splitSpeechClauses(text){
  const raw = voiceSpecificSpeechText(text || "").trim();
  if (!raw) return [];

  return raw
    .split(/(?<=[.!?])\s+|\n+/)
    .map(s => s.trim())
    .filter(Boolean);
}
  
function estimateSpeechMs(text, rateUsed){
  const t = (text || "").trim();
  if (!t) return 0;

  const words = (t.match(/\S+/g) || []).length;
  const effectiveWpm = (IS_IOS ? 142 : 150) * (rateUsed || 1);
  let ms = (words / Math.max(1, effectiveWpm)) * 60000;

  const punct = (t.match(/[,.!?;:]/g) || []).length;
  ms += punct * (IS_IOS ? 110 : 90) * paceFactor();

  return Math.max(300, Math.min(ms, 5200));
}

function speakUtterance(text){
  const immediate = { started: Promise.resolve(), done: Promise.resolve(), rateUsed: baseSpeechRate() };
  if (!voiceReady || !chosenVoice || !speakWhileTyping.checked) return immediate;

  const part = (text || "").trim();
  if (!part) return immediate;

  const nonce = ++currentSpeechNonce;
  const generation = speechGeneration;

  const u = new SpeechSynthesisUtterance(part);
  activeUtterance = u;

  const style = styleParams();

  if (chosenVoice) u.voice = chosenVoice;
  if (chosenVoice?.lang) u.lang = chosenVoice.lang;
  u.pitch = style.pitch;
  u.rate  = style.rate;
  u.volume = 1.0;

  let startedResolve, doneResolve;
  const started = new Promise(r => (startedResolve = r));
  const done = new Promise(r => (doneResolve = r));

  let finished = false;
  let failSafeTimer = null;

  function cleanup(){
    clearTimeout(failSafeTimer);
    if (activeUtterance === u) activeUtterance = null;
  }

  function finishUtterance(){
    if (finished) return;
    finished = true;

    cleanup();
    currentSpeechNonce++;
    stopFallbackBeats();
    stopChromePulseLoop();
    forceOrbOffHard();
    ballWrap.classList.remove("speaking");
    doneResolve();
  }

  u.onboundary = (ev) => {
    if (!ev) return;
    if (generation !== speechGeneration) return;
    if (nonce !== currentSpeechNonce) return;
    if (!ballWrap.classList.contains("speaking")) return;

    if (ev.name === "word" || typeof ev.charIndex === "number"){
      const jitter = IS_DESKTOP_CHROME
        ? 1.12
        : IS_IOS
          ? (1.06 + Math.random() * 0.08)
          : IS_MOBILE_LAYOUT
            ? (1.10 + Math.random() * 0.22)
            : (1.08 + Math.random() * 0.18);

      triggerBeat(jitter);
    }
  };

  u.onstart = () => {
    if (generation !== speechGeneration){
      cleanup();
      startedResolve();
      doneResolve();
      return;
    }

    clearOrbKillTimers();
    stopFallbackBeats();
    stopChromePulseLoop();

    speakingCount = 1;
    ballWrap.classList.add("speaking");
    ballWrap.classList.remove("idle");
    ballWrap.classList.remove("beat");
    setBeatScale("1.0010");

    speechStartTs = performance.now();

    triggerBeat(IS_DESKTOP_CHROME ? 1.10 : (IS_IOS ? 1.10 : 1.14));

    if (IS_DESKTOP_CHROME){
      startChromePulseLoop(generation, nonce);
    }else{
      startFallbackBeats(generation);
    }

    startedResolve();

    failSafeTimer = setTimeout(() => {
      try { if (activeUtterance === u) speechSynthesis.cancel(); } catch(e){}
      finishUtterance();
    }, 12000);
  };

  u.onend = () => {
    finishUtterance();
  };

  u.onerror = () => {
    finishUtterance();
  };

  try{
    speechSynthesis.speak(u);
  }catch(e){
    cleanup();
    startedResolve();
    doneResolve();
  }

  return { started, done, rateUsed: u.rate };
}

async function speakClauseList(clauses, token){
  if (!clauses.length) return;

  const lead = leadBeforeVoiceMs();
  await sleep(lead);
  if (!isTokenLive(token)) return;

  for (const clause of clauses){
    if (!isTokenLive(token)) return;
    if (!speakWhileTyping.checked || !voiceReady || !chosenVoice) return;

    const speech = speakUtterance(clause);
    await speech.done;
    if (!isTokenLive(token)) return;

    hardPulseOff();
    await sleep(IS_IOS ? 55 : 70);
  }
}

async function typeChunkSmooth(chunk, token){
  let i = 0;
  let nextAt = performance.now();

  while (i < chunk.length){
    if (!isTokenLive(token)) return;

    const now = performance.now();
    if (now < nextAt){
      await nextFrame();
      continue;
    }

    let steps = 1;

    if (IS_IOS){
      const a = chunk[i] || "";
      const b = chunk[i + 1] || "";
      const c = chunk[i + 2] || "";

      const plainA = /[A-Za-z0-9]/.test(a);
      const plainB = /[A-Za-z0-9]/.test(b);
      const plainC = /[A-Za-z0-9]/.test(c);

      if (plainA && plainB && plainC) steps = 3;
      else if (plainA && plainB) steps = 2;
      else steps = 1;
    } else if ((IS_MOBILE_LAYOUT || IS_SAFARI) && i + 1 < chunk.length) {
      const ch = chunk[i];
      const next = chunk[i + 1];
      const plainA = /[A-Za-z0-9]/.test(ch);
      const plainB = /[A-Za-z0-9]/.test(next);
      if (plainA && plainB) steps = 2;
    }

    if (IS_SAFARI && !IS_MOBILE_LAYOUT) steps = Math.max(steps, 2);

    for (let s = 0; s < steps && i < chunk.length; s++){
      const ch = chunk[i];
      screenEl.textContent += ch;
      autoScrollScreen();
      i++;

      if (/[.!?:,\n;]/.test(ch)) {
        nextAt = now + charDelay(ch);
        break;
      }

      nextAt = now + charDelay(ch);
    }

    await nextFrame();
  }
}

async function typeAndSpeakChunk(chunk, token){
  const clauses = speakWhileTyping.checked ? splitSpeechClauses(chunk) : [];

  if (!clauses.length){
    await typeChunkSmooth(chunk, token);
    return;
  }

  let remaining = chunk;

  for (const clause of clauses){
    if (!isTokenLive(token)) return;

    const idx = remaining.toLowerCase().indexOf(clause.toLowerCase());

    let piece;

    if (idx >= 0){
      piece = remaining.slice(0, idx + clause.length);
      remaining = remaining.slice(idx + clause.length);
    } else {
      piece = remaining;
      remaining = "";
    }

    if (piece){
      await typeChunkSmooth(piece, token);
    }

    await sleep(40);

    await speakClauseList([clause], token);
  }

  if (remaining){
    await typeChunkSmooth(remaining, token);
  }
}

async function speakAndTypePerSentence(text, token){
  if (!isTokenLive(token)) return;

  const chunks = splitChunks(text || "");

  for (const chunk of chunks){
    if (!isTokenLive(token)) return;

    if (chunk === "\n\n" || chunk === "\n\n\n"){
      hardPulseOff();
      for (const ch of chunk){
        if (!isTokenLive(token)) return;
        screenEl.textContent += ch;
        autoScrollScreen();
      }
      await sleep((chunk === "\n\n\n" ? SECTION_PAUSE_MS : PARAGRAPH_PAUSE_MS) * paceFactor());
      continue;
    }

    if (isEllipsisOnly(chunk)){
      hardPulseOff();
      const dots = (chunk.match(/[.\u2026]/g) || []).length || 3;
      for (let i = 0; i < dots; i++){
        if (!isTokenLive(token)) return;
        screenEl.textContent += "…";
        autoScrollScreen();
        await sleep(((i === dots - 1) ? FINAL_ELLIPSIS_DELAY : ELLIPSIS_DELAY) * paceFactor());
      }
      continue;
    }

    await typeAndSpeakChunk(chunk, token);
    hardPulseOff();
    await sleep(SENTENCE_PAUSE_MS * paceFactor());
  }

  hardStopOrbVisuals();
}

async function fetchJsonWithRetry(url, options = {}, retries = 1){
  for (let attempt = 0; attempt <= retries; attempt++){
    try{
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(`${options.method || "GET"} failed: ${res.status} ${res.statusText}`);
      return await res.json();
    }catch(err){
      const isAbort = err?.name === "AbortError";
      const isMaybeLoadFailed =
        err instanceof TypeError ||
        /load failed/i.test(String(err)) ||
        /networkerror/i.test(String(err));

      if (isAbort) throw err;
      if (attempt >= retries || !isMaybeLoadFailed) throw err;

      await sleep((IS_IOS || IS_SAFARI) ? 260 : 160);
    }
  }
}

function guardAction(){
  const now = performance.now();
  if ((now - lastActionTs) < INPUT_GUARD_MS) return false;
  lastActionTs = now;
  return true;
}

async function forceEndSession(){
  if (!guardAction()) return;

  const token = bumpRunToken();
  hardStopAllAudioAndBeats();
  abortInFlightFetch();

  sessionDone = true;
  chooseInFlight = false;
  startInFlight = false;

  yesBtn.disabled = true;
  noBtn.disabled = true;
  stopBtn.disabled = true;

  quickClearScreen();

  const goodbye =
`Sorry to see you go.
Come back another time…
The words will be waiting for your call.`;

  await speakAndTypePerSentence(goodbye, token);

  statusEl.textContent = "Session ended. Press Start to begin again.";
  setStartEnabled(true);

  try{
    fetch(`${API}/choose`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ answer: "stop", context: { session_id: sessionId } }),
      keepalive: true
    }).catch(()=>{});
  }catch(e){}
}

async function startSession(token){
  try{
    statusEl.textContent = "";
    sessionDone = false;

    setButtonsEnabled(false);
    showStopButton(false);
    stopBtn.disabled = true;
    quickClearScreen();

    abortInFlightFetch();
    currentFetchController = new AbortController();

    const data = await fetchJsonWithRetry(`${API}/start`, {
      signal: currentFetchController.signal
    }, 1);

    if (!isTokenLive(token)) return;

    sessionId = data.session_id || sessionId;

    if (data.prompt)   await speakAndTypePerSentence(normalizeCTA(trimLeadingNewlines(data.prompt)), token);
    if (data.guidance) await speakAndTypePerSentence(normalizeCTA(trimLeadingNewlines(data.guidance)), token);

    if (!isTokenLive(token)) return;
    setButtonsEnabled(true);
    stopBtn.disabled = true;
  }catch(err){
    if (!isTokenLive(token)) return;
    screenEl.textContent = `⚠️ Startup error\n${String(err)}`;
    setButtonsEnabled(false);
    stopBtn.disabled = true;
    setStartEnabled(true);
  }
}

async function sendChoice(answer){
  if (chooseInFlight) return;
  if (sessionDone) return;
  if (!guardAction()) return;

  chooseInFlight = true;

  const token = runToken;

  try{
    setButtonsEnabled(false);

    quickClearScreen();

    abortInFlightFetch();
    currentFetchController = new AbortController();

    const data = await fetchJsonWithRetry(`${API}/choose`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        answer,
        context:{ session_id:sessionId }
      }),
      signal:currentFetchController.signal
    },1);

    if (!isTokenLive(token)) return;

    if (data.context?.session_id) sessionId = data.context.session_id;

    if (data.text){
      await sleep(20);
      await speakAndTypePerSentence(normalizeCTA(trimLeadingNewlines(data.text)), token);
    }

    if (!isTokenLive(token)) return;

    const done = !!data.done;
    sessionDone = done;

    if (done){
      yesBtn.disabled = true;
      noBtn.disabled = true;
      stopBtn.disabled = true;
      statusEl.textContent = "Session ended. Press Start to begin again.";
      setStartEnabled(true);
    }else{
      setButtonsEnabled(true);
      stopBtn.disabled = false;
    }

  }catch(err){
    if (!isTokenLive(runToken)) return;

    screenEl.textContent = `⚠️ Request error\n${String(err)}`;

    if (!sessionDone){
      setButtonsEnabled(true);
      stopBtn.disabled = false;
    }

  }finally{
    chooseInFlight = false;
  }
}

let introAnswered = false;

function revealEndSessionAfterIntro(){
  if (introAnswered || sessionDone) return;
  introAnswered = true;
  showStopButton(true);
  stopBtn.disabled = false;
}

function bindStartOnce(){
  if (startBound) return;
  startBound = true;

  startBtn.addEventListener("click", async (e)=>{
    e.preventDefault();

    if (startInFlight) return;
    if (!guardAction()) return;
    startInFlight = true;

    const token = bumpRunToken();

    setStartEnabled(false);
    setButtonsEnabled(false);
    showStopButton(false);
    stopBtn.disabled = true;
    statusEl.textContent = "";

    abortInFlightFetch();
    hardStopAllAudioAndBeats();

    sessionId = null;
    sessionDone = false;
    chooseInFlight = false;

    introAnswered = false;

    unlockVoice();
    await ensureVoiceSelected(1400);
    await primeSpeechEngine();

    if (!titleShown){
      titleShown = true;
      playGhostlyWhoosh();
      if (titleEl) titleEl.classList.add("visible");
    }

    await sleep(WHOOSH_MS + WHOOSH_BUFFER_MS);
    if (!isTokenLive(token)){ startInFlight = false; return; }

    await startSession(token);

    startInFlight = false;
  });
}

if (typeof window !== "undefined" && "speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    selectVoice();
  };
}

document.addEventListener("touchstart", (e) => {
  window.__touchStartX = e.touches?.[0]?.clientX || 0;
}, { passive: true });

document.addEventListener("touchmove", (e) => {
  if (!e.target.closest(".screen")) {
    if (Math.abs((e.touches?.[0]?.clientX || 0) - (window.__touchStartX || 0)) > 12) {
      e.preventDefault();
    }
  }
}, { passive: false });

setButtonsEnabled(false);
setStartEnabled(true);
showStopButton(false);
syncVoiceLabel();
selectVoice();
bindStartOnce();

yesBtn.addEventListener("click", (e)=>{
  e.preventDefault();
  if (sessionDone) return;
  revealEndSessionAfterIntro();
  sendChoice("yes");
});

noBtn.addEventListener("click", (e)=>{
  e.preventDefault();
  if (sessionDone) return;
  revealEndSessionAfterIntro();
  sendChoice("no");
});

stopBtn.addEventListener("click", (e)=>{
  e.preventDefault();
  if (sessionDone) return;
  forceEndSession();
});

["yesBtn","noBtn","stopBtn","startBtn"].forEach(id => {
  const node = document.getElementById(id);
  if (!node) return;
  node.addEventListener("touchend", (e) => {
    e.preventDefault();
    node.click();
  }, { passive:false });
});

speedSel.addEventListener("change", () => {
  const v = speedSel.value;
  statusEl.textContent =
    v === "slow" ? "Slow pace selected." :
    v === "fast" ? "Fast pace selected." :
    "Normal pace selected.";

  if (window.speechSynthesis && speechSynthesis.speaking){
    try { speechSynthesis.cancel(); } catch(e){}
    hardStopAllAudioAndBeats();
  }
});

speakWhileTyping.addEventListener("change", syncVoiceLabel);

document.addEventListener("visibilitychange", () => {
  if (document.hidden){
    hardStopAllAudioAndBeats();
  }
});
</script>
